<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>行为进度条</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
    <h1>我的行为进度条</h1>

    <section class="card" id="loginCard">
        <h2>登录 / 注册令牌</h2>
        <div class="form-row">
            <label for="tokenInput">个人令牌（用来识别你的进度）</label>
            <input id="tokenInput" type="text" placeholder="例如：my-study-token">
        </div>
        <div class="btn-row">
            <button id="loginBtn" class="btn primary">使用这个令牌登录</button>
            <button id="registerBtn" class="btn">注册新令牌并登录</button>
        </div>
        <p class="hint">可以自己起一个容易记住的字符串，之后每次用同一个令牌就能看到自己的进度。</p>
    </section>

    <section class="card hidden" id="mainCard">
        <h2>行为配置</h2>
        <h2>行为配置</h2>
        <div class="form-row">
            <label for="behaviorName">行为名称</label>
            <input id="behaviorName" type="text" placeholder="例如：学习英语 30 分钟">
        </div>
        <div class="form-row">
            <label for="stepPercent">每次点击增加 (%)</label>
            <input id="stepPercent" type="number" min="1" max="100" step="1" value="10">
        </div>
        <button id="saveConfigBtn" class="btn primary">保存设置</button>
        <p class="hint">提示：修改配置后，进度会从 0% 重新开始。</p>
    </section>

    <section class="card hidden" id="progressCard">
        <h2>进度</h2>
        <p id="currentBehavior" class="behavior-text">当前行为：加载中...</p>
        <div class="progress-bar">
            <div id="progressFill" class="progress-fill">
                <span id="progressLabel" class="progress-label">0%</span>
            </div>
        </div>
        <p id="countInfo" class="count-info">已完成 0 次</p>
        <button id="clickBtn" class="btn">完成一次行为</button>
    </section>

    <section class="card hidden" id="helpCard">
        <h2>使用说明</h2>
        <ul class="usage">
            <li>在上面设置你想养成的行为和每次点击增加的百分比。</li>
            <li>每次完成一次行为，就点一次「完成一次行为」，进度条会带动画前进。</li>
            <li>进度达到 100% 就代表这个阶段目标完成，可以重新配置下一阶段。</li>
        </ul>
    </section>
</div>

<script src="script.js"></script>
</body>
</html>
